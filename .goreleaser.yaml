version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: doclint
    main: ./cmd/doclint
    binary: doclint
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  # Abbreviate the commit hash to 7 chars (used in both the link text and URL).
  abbrev: 7
  # Render each entry as `[short-sha](commit-url) <subject> by @author` — an
  # explicit markdown link on the SHA, plus the auto-linked @login.
  format: "[{{ .SHA }}](https://github.com/openserbia/doclint/commit/{{ .SHA }}) {{ .Message }}{{ with .Logins }} by {{ . | englishJoin }}{{ end }}"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
