version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: doclint
    main: ./cmd/doclint
    binary: doclint
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  # Abbreviate the commit hash; GitHub auto-links a short SHA in release notes.
  abbrev: 7
  # Render each entry as `<short-sha> <subject> by @author` — GitHub turns both
  # the short SHA and the @login into clickable links (no full hash or raw email).
  format: "{{ .SHA }} {{ .Message }}{{ with .Logins }} by {{ . | englishJoin }}{{ end }}"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
